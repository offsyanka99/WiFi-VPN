name: Build

on:
  push:
    branches: [main, "improve/**", "release/**"]
  pull_request:
    branches: [main]

jobs:
  assemble-debug:
    name: assembleDebug
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      # Release signing secrets are not available in CI; use assembleDebug as the gate.
      # Signed release builds remain local (keystore.properties) or a future signed workflow.
